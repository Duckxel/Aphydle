# Sample nginx config for serving the Aphydle production bundle.
#
# 1. Build the project: ./setup.sh
# 2. Edit `root` below to point at the absolute path of the generated dist/.
# 3. Drop this file into /etc/nginx/sites-available/aphydle and symlink it to
#    /etc/nginx/sites-enabled/, then `nginx -t && systemctl reload nginx`.
#
# Hosting under a sub-path (e.g. /games/aphydle/) instead of the root?
# Re-build with VITE_APP_BASE_PATH=/games/aphydle/ and update the `location`
# block accordingly.

server {
    listen      80;
    listen      [::]:80;
    server_name aphydle.example.com;

    # Absolute path to the built static bundle.
    root /var/www/aphydle/dist;
    index index.html;

    # Long cache for hashed assets, no cache for index.html.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback — any unknown path serves index.html so the React app
    # can take over routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip on for text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
