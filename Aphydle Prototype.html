<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aphydle — Daily Plant Guess</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Geist+Mono:wght@400..600&family=Geist:wght@400..700&display=swap" rel="stylesheet" />

<style>
:root {
  --serif: 'Fraunces', Georgia, serif;
  --sans: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --mono: 'Geist Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: #0A0A0A;
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
@keyframes aphFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes aphSlideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
button { font-family: inherit; }
input { font-family: inherit; }
::selection { background: rgba(0,210,106,0.3); }
.mobile-stage { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: #0A0A0A; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="engine.jsx"></script>
<script type="text/babel" src="plant-image.jsx"></script>
<script type="text/babel" src="ui-components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="finish-screen.jsx"></script>
<script type="text/babel" src="guess-row.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useReducer } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "device": "desktop",
  "modalLayout": "album"
}/*EDITMODE-END*/;

function ThemeToggle({ theme, onChange }) {
  const T = window.AphydleUI.tokens(theme);
  return (
    <div style={{
      display: "flex", border: `1px solid ${T.border}`,
      fontFamily: "var(--mono)", fontSize: 10, letterSpacing: "0.12em",
    }}>
      {["dark", "light"].map((m) => (
        <button key={m} onClick={() => onChange(m)}
          style={{
            padding: "8px 12px", border: "none", cursor: "pointer",
            background: theme === m ? T.text : "transparent",
            color: theme === m ? T.bg : T.muted,
          }}>{m.toUpperCase()}</button>
      ))}
    </div>
  );
}

// =============================================================
// Desktop play view (active game state)
// =============================================================
function DesktopPlayView({ theme, state, dispatch, onChangeTheme }) {
  const T = window.AphydleUI.tokens(theme);
  const { ANSWER_PLANT } = window.APHYDLE_DATA;
  const { MosaicLeaf, MosaicStrip, GuessInput } = window.AphydleUI;
  const { GuessRow, GuessRowHeader } = window.AphydleGuessRow;
  const { AttemptsBar } = window.AphydleFinish;
  const [overlay, setOverlay] = useState(null);

  const attempts = state.guesses.length;
  const attemptsLeft = 10 - attempts;
  const level = [7,6,5,4,4,3,2,1,0,0,0][Math.min(attempts,10)];
  const guessesNewestFirst = [...state.guesses].reverse();

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.text, fontFamily: "var(--sans)" }}>
      <header style={{
        maxWidth: 1280, margin: "0 auto", padding: "20px 40px 0",
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <MosaicLeaf size={22} theme={theme} />
          <div style={{ fontFamily: "var(--serif)", fontSize: 22, letterSpacing: "0.04em", fontWeight: 500 }}>Aphydle</div>
        </div>
        <div style={{ fontFamily: "var(--mono)", fontSize: 11, color: T.muted, letterSpacing: "0.12em" }}>
          WED 26 APR  ·  No. 142
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <ThemeToggle theme={theme} onChange={onChangeTheme} />
          <button onClick={() => setOverlay("how")} style={navBtn(T)}>?</button>
          <button onClick={() => setOverlay("archive")} style={navBtn(T)}>◫</button>
          <button onClick={() => setOverlay("stats")} style={navBtn(T)}>▤</button>
        </div>
      </header>

      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "28px 40px 80px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "440px 1fr", gap: 48, alignItems: "start" }}>
          <div style={{ position: "sticky", top: 28 }}>
            <div style={{
              display: "flex", justifyContent: "space-between", alignItems: "center",
              marginBottom: 12,
            }}>
              <div style={{ fontFamily: "var(--mono)", fontSize: 10, color: T.muted, letterSpacing: "0.14em" }}>
                MOSAIC LEVEL {level}
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ fontFamily: "var(--mono)", fontSize: 10, color: T.muted, letterSpacing: "0.12em" }}>
                  {attemptsLeft} LEFT
                </span>
                <AttemptsBar used={attempts} total={10} theme={theme} />
              </div>
            </div>
            <window.PlantImage src={ANSWER_PLANT.imageUrl} level={level} theme={theme} size={440} />
            <div style={{ marginTop: 14 }}><MosaicStrip theme={theme} height={6} opacity={0.4} /></div>
            <div style={{ marginTop: 18 }}>
              <GuessInput theme={theme}
                onSubmit={(p) => dispatch({ type: "guess", plant: p })}
                disabled={false} attemptsLeft={attemptsLeft} />
            </div>
          </div>

          <div style={{ display: "flex", flexDirection: "column" }}>
            <div style={{
              display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 14,
            }}>
              <div style={{ fontFamily: "var(--mono)", fontSize: 10, color: T.muted, letterSpacing: "0.14em" }}>
                ATTRIBUTE COMPARISON
              </div>
              <div style={{ fontFamily: "var(--mono)", fontSize: 10, color: T.muted, letterSpacing: "0.12em" }}>
                {state.guesses.length} / 10 GUESSES
              </div>
            </div>

            {state.guesses.length === 0 ? (
              <EmptyComparison theme={theme} />
            ) : (
              <>
                <GuessRowHeader theme={theme} />
                <div style={{ display: "flex", flexDirection: "column" }}>
                  {guessesNewestFirst.map((g, i) => (
                    <GuessRow key={`${g.id}-${state.guesses.length - 1 - i}`}
                      guess={g} answer={ANSWER_PLANT} theme={theme}
                      isAnswer={g.id === ANSWER_PLANT.id}
                      isLatest={i === 0} />
                  ))}
                </div>
                <div style={{
                  marginTop: 16, padding: "10px 12px",
                  fontFamily: "var(--mono)", fontSize: 9, color: T.muted,
                  letterSpacing: "0.1em", lineHeight: 1.6,
                  borderLeft: `2px solid ${T.border}`,
                }}>
                  GREEN CELLS = ATTRIBUTE MATCHES THE ANSWER · STRUCK-THROUGH = NO MATCH
                </div>
              </>
            )}
          </div>
        </div>
      </div>

      {overlay === "stats" && <window.AphydleScreens.StatsScreen theme={theme} onClose={() => setOverlay(null)} />}
      {overlay === "archive" && <window.AphydleScreens.ArchiveScreen theme={theme} onClose={() => setOverlay(null)} />}
      {overlay === "how" && <window.AphydleScreens.HowToScreen theme={theme} onClose={() => setOverlay(null)} />}
    </div>
  );
}

function EmptyComparison({ theme }) {
  const T = window.AphydleUI.tokens(theme);
  const cols = window.APHYDLE_DATA.COMPARE_COLUMNS;
  return (
    <div style={{
      border: `1px dashed ${T.border}`, padding: "32px 28px",
      display: "flex", flexDirection: "column", gap: 16,
    }}>
      <div style={{ fontFamily: "var(--serif)", fontSize: 22, lineHeight: 1.3, color: T.text, maxWidth: 460 }}>
        Type a plant to begin.
      </div>
      <div style={{ fontFamily: "var(--sans)", fontSize: 14, lineHeight: 1.5, color: T.muted, maxWidth: 520 }}>
        Each guess reveals which attributes match the mystery plant. The image clears one step with every wrong try.
      </div>
      <div style={{
        display: "grid", gridTemplateColumns: `repeat(${cols.length}, minmax(0, 1fr))`,
        gap: 4, marginTop: 8,
      }}>
        {cols.map((c) => (
          <div key={c.key} style={{
            padding: "10px 8px", background: theme === "dark" ? "rgba(255,255,255,0.02)" : "rgba(26,24,20,0.025)",
            border: `1px solid ${T.border}`,
            fontFamily: "var(--mono)", fontSize: 9, letterSpacing: "0.1em",
            color: T.subtle, fontWeight: 600, textTransform: "uppercase",
          }}>{c.label}</div>
        ))}
      </div>
    </div>
  );
}

function navBtn(T) {
  return {
    width: 32, height: 32, background: "transparent",
    border: `1px solid ${T.border}`, color: T.muted,
    fontFamily: "var(--mono)", fontSize: 13, cursor: "pointer",
  };
}

// =============================================================
// Mobile play view (inside iOS frame)
// =============================================================
function MobilePlayView({ theme, state, dispatch, onChangeTheme }) {
  const T = window.AphydleUI.tokens(theme);
  const { ANSWER_PLANT } = window.APHYDLE_DATA;
  const { MosaicLeaf, GuessInput } = window.AphydleUI;
  const { AttemptsBar } = window.AphydleFinish;
  const attempts = state.guesses.length;
  const attemptsLeft = 10 - attempts;
  const level = [7,6,5,4,4,3,2,1,0,0,0][Math.min(attempts,10)];
  const guessesNewestFirst = [...state.guesses].reverse();
  const INPUT_BAR_HEIGHT = 96;
  const cols = window.APHYDLE_DATA.COMPARE_COLUMNS;
  const matchAccent = theme === "dark" ? "#00D26A" : "#007F3F";

  return (
    <div style={{
      width: "100%", height: "100%", position: "relative",
      background: T.bg, color: T.text, fontFamily: "var(--sans)",
      display: "flex", flexDirection: "column",
    }}>
      {/* Header — fixed */}
      <div style={{
        flexShrink: 0,
        padding: "60px 18px 10px", display: "flex",
        alignItems: "center", justifyContent: "space-between",
        borderBottom: `1px solid ${T.border}`, background: T.bg,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <MosaicLeaf size={16} theme={theme} />
          <span style={{ fontFamily: "var(--serif)", fontSize: 17, fontWeight: 500 }}>Aphydle</span>
        </div>
        <div style={{ fontFamily: "var(--mono)", fontSize: 9, color: T.muted, letterSpacing: "0.1em" }}>
          WED 26 APR · No. 142
        </div>
      </div>

      {/* Scrollable middle */}
      <div style={{
        flex: 1, overflow: "auto",
        paddingBottom: INPUT_BAR_HEIGHT + 8,
      }}>
        {/* Image + attempts */}
        <div style={{ padding: "10px 18px 0" }}>
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8,
          }}>
            <span style={{ fontFamily: "var(--mono)", fontSize: 9, color: T.muted, letterSpacing: "0.12em" }}>LEVEL {level}</span>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontFamily: "var(--mono)", fontSize: 9, color: T.muted, letterSpacing: "0.1em" }}>{attemptsLeft} LEFT</span>
              <AttemptsBar used={attempts} total={10} theme={theme} />
            </div>
          </div>
          <window.PlantImage src={ANSWER_PLANT.imageUrl} level={level} theme={theme} size={340} />
        </div>

        {/* Guess comparison rows — mobile uses card layout per guess */}
        <div style={{ padding: "16px 18px 20px" }}>
          <div style={{
            fontFamily: "var(--mono)", fontSize: 9, color: T.muted,
            letterSpacing: "0.12em", marginBottom: 10,
          }}>
            {state.guesses.length === 0 ? "TYPE A PLANT TO BEGIN" : `GUESSES  ·  ${state.guesses.length}/10`}
          </div>
          {state.guesses.length === 0 ? (
            <div style={{
              border: `1px dashed ${T.border}`, padding: "16px 14px",
              fontFamily: "var(--sans)", fontSize: 13, color: T.muted, lineHeight: 1.5,
            }}>
              Each guess will reveal which attributes match — habitat, family, growth form, and more.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {guessesNewestFirst.map((g, i) => {
                const isAnswer = g.id === ANSWER_PLANT.id;
                const isLatest = i === 0;
                return (
                  <div key={`${g.id}-${state.guesses.length - 1 - i}`} style={{
                    border: `1px solid ${isAnswer ? matchAccent : T.border}`,
                    background: isAnswer
                      ? (theme === "dark" ? "rgba(0,210,106,0.08)" : "rgba(0,127,63,0.06)")
                      : (theme === "dark" ? "rgba(255,255,255,0.02)" : "rgba(26,24,20,0.025)"),
                    boxShadow: isAnswer ? `0 0 24px ${matchAccent}40` : "none",
                    animation: isLatest ? "aphSlideUp 0.4s cubic-bezier(0.16,1,0.3,1)" : "none",
                  }}>
                    {/* Plant name header */}
                    <div style={{
                      padding: "10px 12px",
                      borderBottom: `1px solid ${T.border}`,
                      display: "flex", alignItems: "baseline", justifyContent: "space-between",
                    }}>
                      <div style={{
                        fontFamily: "var(--sans)", fontSize: 14, fontWeight: 500,
                        color: isAnswer ? matchAccent : T.text,
                        textDecoration: isAnswer ? "none" : "line-through",
                        textDecorationColor: isAnswer ? "transparent" : `${T.muted}80`,
                      }}>{g.name}</div>
                      {isAnswer && (
                        <div style={{
                          fontFamily: "var(--mono)", fontSize: 8, color: matchAccent,
                          letterSpacing: "0.14em", fontWeight: 600,
                        }}>✓ FOUND</div>
                      )}
                    </div>
                    {/* Attribute pills */}
                    <div style={{
                      padding: "8px 10px",
                      display: "grid",
                      gridTemplateColumns: "repeat(2, 1fr)",
                      gap: 4,
                    }}>
                      {cols.map((col) => {
                        const guessVal = g[col.key];
                        const answerVal = ANSWER_PLANT[col.key];
                        const match = guessVal && answerVal && guessVal === answerVal;
                        return (
                          <div key={col.key} style={{
                            padding: "6px 8px",
                            background: match
                              ? (theme === "dark" ? "rgba(0,210,106,0.12)" : "rgba(0,127,63,0.10)")
                              : "transparent",
                            border: `1px solid ${match ? matchAccent : T.border}`,
                            minWidth: 0,
                          }}>
                            <div style={{
                              fontFamily: "var(--mono)", fontSize: 7, letterSpacing: "0.12em",
                              color: match ? matchAccent : T.subtle, fontWeight: 600,
                              textTransform: "uppercase", marginBottom: 2,
                            }}>{col.label}</div>
                            <div style={{
                              fontFamily: "var(--sans)", fontSize: 10,
                              color: match ? matchAccent : T.muted,
                              fontWeight: match ? 600 : 400,
                              textDecoration: match ? "none" : "line-through",
                              textDecorationColor: match ? "transparent" : `${T.muted}50`,
                              lineHeight: 1.2,
                              overflow: "hidden",
                              textOverflow: "ellipsis",
                              whiteSpace: "nowrap",
                            }}>{guessVal || "—"}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Sticky input bar — docked at bottom */}
      <div style={{
        position: "absolute", left: 0, right: 0, bottom: 0,
        padding: "10px 14px 18px",
        background: theme === "dark"
          ? "linear-gradient(180deg, rgba(10,10,10,0) 0%, rgba(10,10,10,0.95) 30%, rgba(10,10,10,1) 60%)"
          : "linear-gradient(180deg, rgba(245,241,232,0) 0%, rgba(245,241,232,0.95) 30%, rgba(245,241,232,1) 60%)",
        borderTop: `1px solid ${T.border}`,
        backdropFilter: "blur(8px)",
        WebkitBackdropFilter: "blur(8px)",
      }}>
        <GuessInput theme={theme} onSubmit={(p) => dispatch({ type: "guess", plant: p })}
          disabled={false} attemptsLeft={attemptsLeft} />
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [state, dispatch] = useReducer(window.AphydleApp.gameReducer,
    { guesses: [], outcome: null, modalOpen: false });

  const isFinished = !!state.outcome;
  const previewPlant = window.APHYDLE_DATA.ANSWER_PLANT;

  // ============== Render: desktop or mobile, play or finish ==============
  let stage;

  if (t.device === "desktop") {
    if (isFinished) {
      stage = (
        <window.AphydleFinish.FinishScreen
          won={state.outcome === "won"} plant={previewPlant}
          guessCount={state.guesses.length} theme={t.theme}
          layout={t.modalLayout}
          onPlayAgain={() => dispatch({ type: "reset" })}
          onOpenStats={() => {}} onOpenArchive={() => {}} onOpenHowTo={() => {}}
        />
      );
    } else {
      stage = (
        <DesktopPlayView theme={t.theme} state={state} dispatch={dispatch}
          onChangeTheme={(v) => setTweak("theme", v)} />
      );
    }
  } else {
    // mobile inside iOS frame
    stage = (
      <div className="mobile-stage" style={{ background: t.theme === "light" ? "#1a1814" : "#0A0A0A" }}>
        <window.IOSDevice dark={t.theme === "dark"} width={402} height={874}>
          {isFinished ? (
            <window.AphydleFinish.FinishScreenMobile
              won={state.outcome === "won"} plant={previewPlant}
              guessCount={state.guesses.length} theme={t.theme}
              onPlayAgain={() => dispatch({ type: "reset" })}
            />
          ) : (
            <MobilePlayView theme={t.theme} state={state} dispatch={dispatch}
              onChangeTheme={(v) => setTweak("theme", v)} />
          )}
        </window.IOSDevice>
      </div>
    );
  }

  return (
    <>
      {stage}
      <window.TweaksPanel>
        <window.TweakSection label="Device" />
        <window.TweakRadio label="Render" value={t.device}
          options={["desktop", "mobile"]}
          onChange={(v) => setTweak("device", v)} />
        <window.TweakSection label="Theme" />
        <window.TweakRadio label="Theme" value={t.theme}
          options={["dark", "light"]}
          onChange={(v) => setTweak("theme", v)} />
        <window.TweakSection label="Finish layout" />
        <window.TweakRadio label="Layout" value={t.modalLayout}
          options={["album", "compact"]}
          onChange={(v) => setTweak("modalLayout", v)} />
        <window.TweakSection label="Game" />
        <window.TweakButton label="Reset game" onClick={() => dispatch({ type: "reset" })} />
        <window.TweakButton label="Auto-play to win" onClick={() => {
          dispatch({ type: "reset" });
          const wrong = window.APHYDLE_DATA.GUESSABLE.filter((p) => p.id !== "monstera-deliciosa").slice(0, 3);
          wrong.forEach((p) => dispatch({ type: "guess", plant: p }));
          const answer = window.APHYDLE_DATA.GUESSABLE.find((p) => p.id === "monstera-deliciosa");
          dispatch({ type: "guess", plant: answer });
        }} />
        <window.TweakButton label="Auto-play to loss" onClick={() => {
          dispatch({ type: "reset" });
          const wrong = window.APHYDLE_DATA.GUESSABLE.filter((p) => p.id !== "monstera-deliciosa").slice(0, 10);
          wrong.forEach((p) => dispatch({ type: "guess", plant: p }));
        }} />
      </window.TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
