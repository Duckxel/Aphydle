      <main style="font-family: system-ui, sans-serif; max-width: 720px; margin: 3rem auto; padding: 0 1.25rem; line-height: 1.6; color: #1a1814;">
        <h1>Aphydle — Daily Plant Guessing Game</h1>
        <p>
          Aphydle is a free daily plant guessing game. Every day a single mystery
          plant is revealed as a pixelated mosaic and you have ten attempts to
          identify it before the image fully clears. A new puzzle goes live at
          UTC midnight.
        </p>
        <p>
          The game requires JavaScript to play. Please enable JavaScript or use a
          modern browser to start guessing.
        </p>

        <h2>How to play Aphydle</h2>
        <ol>
          <li><strong>Open today's puzzle.</strong> The mystery plant is rendered as a chunky low-resolution mosaic on the home screen.</li>
          <li><strong>Submit a guess.</strong> Type a plant name into the guess box and pick a match from the autocomplete dropdown, then submit.</li>
          <li><strong>Read the attribute feedback.</strong> Each guess is compared cell-by-cell against the answer — family, habitat, growth form, foliage, light, native region and toxicity light up green when they match and are struck through when they don't.</li>
          <li><strong>Use the clearing image and unlocked hints.</strong> After every wrong guess the mosaic clears slightly and an extra text hint is revealed, narrowing the search space round by round.</li>
          <li><strong>Solve within ten guesses.</strong> You have ten attempts. Identify the plant to win — or read the answer, fact and global stats on the finish screen if you run out.</li>
        </ol>

        <h2>Frequently asked questions</h2>
        <h3>What is Aphydle?</h3>
        <p>Aphydle is a free daily plant guessing game. One mystery plant per day, ten guesses, a pixelated image that clears as you go.</p>
        <h3>How do I play Aphydle?</h3>
        <p>Submit plant guesses; matching attributes (family, habitat, light, native region, toxicity) light up green and mismatches are struck through. The pixelated image also clears with every wrong guess and a new text hint is revealed.</p>
        <h3>When does a new Aphydle puzzle release?</h3>
        <p>Every day at UTC midnight. Your in-progress guesses are saved locally so you can pause and resume the same puzzle from any tab on the same device.</p>
        <h3>Is Aphydle free to play?</h3>
        <p>Yes. Aphydle runs entirely in your browser, requires no account or signup, and ships with no ads or in-game purchases.</p>
        <h3>How many guesses do I get?</h3>
        <p>Ten per day. Hint text is revealed at attempts one through nine; if you reach guess ten without identifying the plant the answer is shown on the finish screen.</p>
        <h3>Can I replay past Aphydle puzzles?</h3>
        <p>Yes — the Archive screen lets you replay any past puzzle you haven't already finished. Once a daily puzzle is solved or lost it's locked from replay so the daily streak stays honest.</p>
        <h3>How is Aphydle different from Wordle?</h3>
        <p>Aphydle borrows Wordle's once-a-day, ten-attempt structure but you guess plants instead of words. Each guess returns attribute-by-attribute feedback and the pixelated mosaic of the answer clears progressively.</p>
